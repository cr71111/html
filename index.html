<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222}
.header{background:linear-gradient(135deg,#1a3a6e,#2563eb);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;opacity:.8;margin-top:3px}
.stats-bar{display:flex;gap:10px;padding:12px 28px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap}
.stat-card{background:#f8faff;border:1px solid #dbeafe;border-radius:10px;padding:9px 16px;text-align:center;min-width:105px}
.stat-card .num{font-size:24px;font-weight:700;color:#1d4ed8}
.stat-card .label{font-size:11px;color:#64748b;margin-top:2px}
.main{display:flex;height:calc(100vh - 144px)}
.sidebar{width:440px;min-width:400px;overflow-y:auto;background:#fff;border-right:1px solid #e5e7eb}
.tab-bar{display:flex;background:#f8faff;border-bottom:2px solid #e5e7eb;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:#1d4ed8;border-bottom-color:#1d4ed8;background:#fff}
.panel{display:none;padding:10px}
.panel.active{display:block}
.section-title{font-size:12px;font-weight:700;color:#374151;padding:6px 0 5px;border-bottom:1px solid #f3f4f6;margin-bottom:8px}
.station-card{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.station-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.station-head{padding:9px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.station-head.selected{background:#eff6ff}
.station-head.unselected{background:#fff7ed}
.station-head.newsite{background:#f0fdf4}
.station-name{font-size:13px;font-weight:700;color:#1e293b;flex:1}
.station-meta{font-size:11px;color:#64748b;margin-top:2px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-count{background:#dcfce7;color:#166534}
.badge-warn{background:#fee2e2;color:#991b1b}
.badge-score{background:#fef9c3;color:#854d0e}
.cabinet-list{padding:0 12px 9px}
.cabinet-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;margin-bottom:3px;background:#f8faff;font-size:11px}
.cabinet-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cabinet-item .cab-name{flex:1;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.cabinet-item .cab-dist{color:#6b7280;flex-shrink:0}
.cabinet-item .cab-level{font-weight:600;flex-shrink:0}
.no-cabinet{text-align:center;padding:12px;color:#9ca3af;font-size:12px;background:#f9fafb;border-radius:8px}
.tier-row{display:flex;gap:6px;padding:6px 12px 0;flex-wrap:wrap}
.tier-badge{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent}
.tier-1km{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.tier-2km{background:#ffedd5;color:#c2410c;border-color:#fdba74}
.tier-3km{background:#fef9c3;color:#854d0e;border-color:#fde047}
.tier-0{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0}
.tier-detail{padding:0 12px 9px;margin-top:4px}
.tier-section-title{font-size:11px;font-weight:700;color:#475569;margin:4px 0 3px;display:flex;align-items:center;gap:5px}
#mapContainer{flex:1;position:relative}
#mapDiv{width:100%;height:100%}
.map-legend{position:absolute;bottom:20px;right:20px;z-index:999;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.15);font-size:11px}
.map-legend b{display:block;margin-bottom:6px;color:#374151;font-size:12px}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.btn-clear:hover{background:rgba(255,255,255,.3)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
</style>

    </div>
  </div>
</div>

let map, circleLayer = null;


function levelColor(lv){
  if(lv==='特高'||lv==='高') return '#ef4444';
  if(lv==='中高') return '#f59e0b';
  if(lv==='中') return '#22c55e';
  return '#94a3b8';
}
function switchTab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}
function clearSelection(){
  if(circleLayer){ map.removeLayer(circleLayer); circleLayer=null; }
  document.getElementById('btnClear').style.display='none';
  map.flyTo([30.65,104.07],11,{duration:0.8});
}
function flyToWithCircle(lon,lat,radiusKm){
  if(circleLayer) map.removeLayer(circleLayer);
  map.flyTo([lat,lon],14,{duration:0.8});
  circleLayer = L.circle([lat,lon],{radius:radiusKm*1000,color:'#1d4ed8',weight:2.5,
    fillColor:'#1d4ed8',fillOpacity:0.18,dashArray:'8 4'}).addTo(map);
  document.getElementById('btnClear').style.display='inline-block';
}
function updateStats(){
  document.getElementById('s1').textContent=DATA.summary.total_stations;
  document.getElementById('s2').textContent=DATA.summary.selected_count;
  document.getElementById('s3').textContent=DATA.summary.unselected_count;
  document.getElementById('s4').textContent=DATA.summary.total_cabinets;
  document.getElementById('s5').textContent=DATA.task1.filter(i=>i['电柜数量']>0).length;
  document.getElementById('s6').textContent=DATA.task2.length;
  document.getElementById('s7').textContent=DATA.task3.length;
}
function renderSelected(){
  const el=document.getElementById('selectedList');
  let h='';
  DATA.task1.forEach(item=>{
    const s=item['场站'],cnt=item['电柜数量'];
    h+=`<div class="station-card" onclick="flyToWithCircle(${s['经度']},${s['纬度']},1.0)">
      <div class="station-head selected">
        <div><div class="station-name">${s['名称']}</div>
        <div class="station-meta">${s['地区']} · ${s['属性']} · 终端${s['终端数']}个</div></div>
        <span class="badge ${cnt>0?'badge-count':'badge-warn'}">${cnt>0?cnt+'个电柜':'无电柜'}</span>
      </div>`;
    if(item['附近电柜']&&item['附近电柜'].length>0){
      h+=`<div class="cabinet-list">`;
      item['附近电柜'].slice(0,5).forEach(c=>{
        h+=`<div class="cabinet-item">
          <div class="dot" style="background:${levelColor(c['等级'])}"></div>
          <span class="cab-name">${c['品牌']}·${c['站点'].substring(0,15)}</span>
          <span class="cab-level" style="color:${levelColor(c['等级'])}">${c['等级']}</span>
          <span class="cab-dist">${c['距离km']}km</span>
        </div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div class="cabinet-list"><div class="no-cabinet">1km内暂无电柜 · 布局空白区域</div></div>`;
    }
    h+=`</div>`;
  });
  el.innerHTML=h;
}
function renderUnselected(){
  const el=document.getElementById('unselectedList');
  if(!DATA.task2||DATA.task2.length===0){
    el.innerHTML='<div class="no-cabinet" style="margin:16px">暂无满足条件的未选场站</div>';
    return;
  }
  let h='';
  DATA.task2.forEach(item=>{
    const s=item['场站'];
    const t1=item['1km'],t2=item['2km'],t3=item['3km'];
    const flyR = t1.total>0?1:( t2.total>0?2:3 );
    h+=`<div class="station-card" onclick="flyToWithCircle(${s['经度']},${s['纬度']},${flyR})">
      <div class="station-head unselected">
        <div><div class="station-name">${s['名称']}</div>
        <div class="station-meta">${s['地区']} · ${s['属性']} · 终端${s['终端数']}个</div></div>
        <span class="badge badge-score">价值 ${item['价值分']}</span>
      </div>
      <div class="tier-row">
        <span class="tier-badge ${t1.total>0?'tier-1km':'tier-0'}">1km: ${t1.total}个(高${t1.high})</span>
        <span class="tier-badge ${t2.total>0&&t1.total===0?'tier-2km':(t2.total>0?'tier-2km':'tier-0')}">2km: ${t2.total}个(高${t2.high})</span>
        <span class="tier-badge ${t3.total>0&&t2.total===0&&t1.total===0?'tier-3km':(t3.total>0?'tier-3km':'tier-0')}">3km: ${t3.total}个(高${t3.high})</span>
      </div>
      <div class="tier-detail">`;
    const showTier = t1.total>0 ? t1 : (t2.total>0 ? t2 : t3);
    const showLabel = t1.total>0 ? '1km内' : (t2.total>0 ? '2km内' : '3km内');
    const showList = showTier.high_list&&showTier.high_list.length>0 ? showTier.high_list : showTier.list;
    if(showList&&showList.length>0){
      h+=`<div class="tier-section-title"><span style="color:#64748b">${showLabel}最近电柜：</span></div>`;
      showList.slice(0,3).forEach(c=>{
        h+=`<div class="cabinet-item">
          <div class="dot" style="background:${levelColor(c['等级'])}"></div>
          <span class="cab-name">${c['品牌']}·${c['站点'].substring(0,14)}</span>
          <span class="cab-level" style="color:${levelColor(c['等级'])}">${c['等级']}</span>
          <span class="cab-dist">${c['距离km']}km</span>
        </div>`;
      });
    }
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

      <div class="tier-detail">`;

    if(showList&&showList.length>0){

      showList.slice(0,3).forEach(c=>{
        h+=`<div class="cabinet-item">
          <div class="dot" style="background:${levelColor(c['等级'])}"></div>
          <span class="cab-name">${c['品牌']}·${c['站点'].substring(0,14)}</span>
          <span class="cab-level" style="color:${levelColor(c['等级'])}">${c['等级']}</span>
          <span class="cab-dist">${c['距离km']}km</span>

      });
    } else if(item['价值分']===0){
      h+=`<div class="cabinet-list"><div class="no-cabinet">3km内暂无电柜 · 需评估是否值得布局</div></div>`;

function initMap(){
  map=L.map('mapDiv',{center:[30.65,104.07],zoom:11});
  L.tileLayer('https://webrd04.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
    attribution:'© 高德地图',maxZoom:18,opacity:0.70
  }).addTo(map);
  DATA.all_cabinets.forEach(c=>{
    const col=levelColor(c['等级']);
    const r=(c['等级']==='特高'||c['等级']==='高')?10:(c['等级']==='中高'?8:6);
    L.circleMarker([c['纬度'],c['经度']],{radius:r+3,color:'#ffffff',weight:1,fillColor:'#ffffff',fillOpacity:1})
      .addTo(map);
    L.circleMarker([c['纬度'],c['经度']],{radius:r,color:col,weight:1.5,fillColor:col,fillOpacity:0.9})
      .addTo(map)
      .bindPopup(`<b>${c['品牌']} · ${c['站点']}</b><br>等级: <b style="color:${col}">${c['等级']}</b><br>日均换电: ${c['日均换电']} 次/仓 · 仓数: ${c['仓数']}`);
  });
  DATA.all_stations.forEach(s=>{
    const isS=s['是否选择']==='已选';
    const col=isS?'#1d4ed8':'#f97316';
    const sz=isS?22:18;
    const icon=L.divIcon({
      html:`<div style="width:${sz+4}px;height:${sz+4}px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.35)">
        <div style="width:${sz}px;height:${sz}px;background:${col};border:3px solid white;border-radius:50%"></div>
      </div>`,
      className:'',iconSize:[sz+4,sz+4],iconAnchor:[(sz+4)/2,(sz+4)/2]
    });
    L.marker([s['纬度'],s['经度']],{icon})
      .addTo(map)
      .bindPopup(`<b>${s['名称']}</b><br><span style="color:${col};font-weight:600">${s['是否选择']}</span> · ${s['地区']}<br>类型: ${s['属性']} · 终端: ${s['终端数']}个`);
  });
  DATA.all_new_sites.forEach(s=>{
    const col='#10b981';
    const sz=16;
    const icon=L.divIcon({
      html:`<div style="width:${sz+4}px;height:${sz+4}px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.35)">
        <div style="width:${sz}px;height:${sz}px;background:${col};border:3px solid white;border-radius:50%"></div>
      </div>`,
      className:'',iconSize:[sz+4,sz+4],iconAnchor:[(sz+4)/2,(sz+4)/2]
    });
    L.marker([s['纬度'],s['经度']],{icon})
      .addTo(map)
      .bindPopup(`<b>${s['名称']}</b><br><span style="color:${col};font-weight:600">新增站点</span><br>${s['地址']}`);
  });
}
window.addEventListener('load',()=>{
  updateStats();
  renderSelected();
  renderUnselected();
  renderNewSites();
  initMap();
});

</script>
